<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akshada Kute — Full-Stack Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #17171f;
    --border: #2a2a38;
    --accent: #7c6af7;
    --accent2: #f7a26a;
    --accent3: #6af7c0;
    --text: #e8e8f0;
    --muted: #888899;
    --dim: #555566;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ─── NOISE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  /* ─── GRID BACKGROUND ─── */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* ─── GLOW ORBS ─── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    animation: floatOrb 20s ease-in-out infinite;
  }
  .orb-1 { width: 500px; height: 500px; background: rgba(124,106,247,0.12); top: -100px; right: -100px; animation-delay: 0s; }
  .orb-2 { width: 400px; height: 400px; background: rgba(247,162,106,0.08); bottom: 20%; left: -150px; animation-delay: -7s; }
  .orb-3 { width: 300px; height: 300px; background: rgba(106,247,192,0.07); top: 50%; right: 10%; animation-delay: -14s; }

  @keyframes floatOrb {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-40px) scale(1.05); }
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 60px;
    background: rgba(10,10,15,0.7);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    animation: slideDown 0.8s ease forwards;
  }

  @keyframes slideDown {
    from { transform: translateY(-100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.3s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute; bottom: -4px; left: 0; right: 0;
    height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transition: transform 0.3s;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-links a:hover::after { transform: scaleX(1); }

  /* ─── WRAPPER ─── */
  .wrapper { position: relative; z-index: 1; }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center;
    padding: 140px 60px 80px;
    position: relative;
  }

  .hero-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s 0.3s ease forwards;
    display: flex; align-items: center; gap: 12px;
  }
  .hero-tag::before {
    content: '';
    display: inline-block;
    width: 32px; height: 1px;
    background: var(--accent);
  }

  .hero-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.5rem, 9vw, 7.5rem);
    font-weight: 900;
    line-height: 1.02;
    letter-spacing: -0.02em;
    opacity: 0;
    animation: fadeUp 0.9s 0.5s ease forwards;
  }

  .hero-name .line-plain { display: block; color: var(--text); }
  .hero-name .line-gradient {
    display: block;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-desc {
    margin-top: 32px;
    max-width: 560px;
    color: var(--muted);
    font-size: 1.05rem;
    font-weight: 300;
    opacity: 0;
    animation: fadeUp 0.9s 0.7s ease forwards;
  }

  .hero-cta {
    margin-top: 48px;
    display: flex; gap: 16px; flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.9s 0.9s ease forwards;
  }

  .btn {
    padding: 14px 32px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.3s;
    border: none;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 30px rgba(124,106,247,0.4);
  }
  .btn-primary:hover {
    background: #8f7ef9;
    box-shadow: 0 0 50px rgba(124,106,247,0.6);
    transform: translateY(-2px);
  }
  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
  }

  .hero-contacts {
    position: absolute;
    right: 60px; bottom: 80px;
    display: flex; flex-direction: column; gap: 12px; align-items: flex-end;
    opacity: 0;
    animation: fadeUp 0.9s 1.1s ease forwards;
  }

  .contact-item {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--dim);
    text-decoration: none;
    letter-spacing: 0.06em;
    transition: color 0.3s;
    display: flex; align-items: center; gap: 10px;
  }
  .contact-item:hover { color: var(--accent); }
  .contact-item .icon {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    transition: border-color 0.3s;
  }
  .contact-item:hover .icon { border-color: var(--accent); }

  .scroll-indicator {
    position: absolute;
    bottom: 32px; left: 60px;
    display: flex; align-items: center; gap: 12px;
    opacity: 0;
    animation: fadeUp 0.9s 1.3s ease forwards;
  }
  .scroll-line {
    width: 1px; height: 60px;
    background: linear-gradient(to bottom, var(--accent), transparent);
    animation: growLine 1.5s 1.5s ease forwards;
    transform-origin: top;
    transform: scaleY(0);
  }
  @keyframes growLine { to { transform: scaleY(1); } }
  .scroll-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    writing-mode: vertical-rl;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── SECTIONS ─── */
  section { padding: 100px 60px; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::before {
    content: '';
    width: 20px; height: 1px;
    background: var(--accent);
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 60px;
    color: var(--text);
  }

  /* ─── SKILLS ─── */
  .skills-section { background: var(--surface); }

  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }

  .skill-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px;
    position: relative;
    overflow: hidden;
    transition: all 0.4s;
  }
  .skill-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .skill-card:hover { border-color: rgba(124,106,247,0.4); transform: translateY(-4px); }
  .skill-card:hover::before { opacity: 1; }

  .skill-category {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .skill-list {
    display: flex; flex-wrap: wrap; gap: 8px;
  }

  .skill-tag {
    padding: 5px 12px;
    background: rgba(124,106,247,0.08);
    border: 1px solid rgba(124,106,247,0.2);
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.73rem;
    color: var(--text);
    letter-spacing: 0.04em;
    transition: all 0.3s;
  }
  .skill-tag:hover {
    background: rgba(124,106,247,0.2);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ─── EXPERIENCE TIMELINE ─── */
  .exp-timeline {
    position: relative;
    padding: 20px 0;
  }

  /* Central spine */
  .exp-timeline::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0; bottom: 0;
    width: 2px;
    transform: translateX(-50%);
    background: linear-gradient(to bottom,
      transparent,
      var(--accent) 8%,
      var(--accent) 50%,
      var(--accent3) 92%,
      transparent);
    opacity: 0.4;
  }

  .exp-item {
    display: flex;
    align-items: flex-start;
    gap: 0;
    margin-bottom: 60px;
    position: relative;
    width: 100%;
  }

  /* Alternating: odd items — card left, info right */
  .exp-item:nth-child(odd) { flex-direction: row; }
  .exp-item:nth-child(even) { flex-direction: row-reverse; }

  /* Card side */
  .exp-card {
    width: calc(50% - 48px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    position: relative;
    transition: all 0.4s;
    flex-shrink: 0;
  }
  .exp-card:hover {
    border-color: rgba(124,106,247,0.45);
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  }

  /* Connector arrow from card to spine */
  .exp-item:nth-child(odd) .exp-card::after {
    content: '';
    position: absolute;
    right: -13px; top: 22px;
    border: 7px solid transparent;
    border-left-color: var(--border);
  }
  .exp-item:nth-child(odd) .exp-card:hover::after {
    border-left-color: rgba(124,106,247,0.45);
  }
  .exp-item:nth-child(even) .exp-card::after {
    content: '';
    position: absolute;
    left: -13px; top: 22px;
    border: 7px solid transparent;
    border-right-color: var(--border);
  }
  .exp-item:nth-child(even) .exp-card:hover::after {
    border-right-color: rgba(124,106,247,0.45);
  }

  /* Top accent bar on card */
  .exp-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 12px 12px 0 0;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .exp-card:hover::before { opacity: 1; }

  /* Centre node */
  .exp-node {
    width: 96px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding-top: 18px;
    position: relative;
    z-index: 2;
  }

  .exp-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--bg);
    border: 3px solid var(--accent);
    box-shadow: 0 0 0 5px rgba(124,106,247,0.15), 0 0 20px rgba(124,106,247,0.4);
    transition: all 0.3s;
  }
  .exp-item:hover .exp-dot {
    background: var(--accent);
    box-shadow: 0 0 0 8px rgba(124,106,247,0.2), 0 0 30px rgba(124,106,247,0.6);
  }

  .exp-year-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent2);
    letter-spacing: 0.08em;
    background: rgba(247,162,106,0.1);
    border: 1px solid rgba(247,162,106,0.25);
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    text-align: center;
  }

  /* Right side (metadata placeholder — keeps layout) */
  .exp-meta {
    width: calc(50% - 48px);
    flex-shrink: 0;
    padding-top: 18px;
  }
  .exp-item:nth-child(odd) .exp-meta { padding-left: 0; }
  .exp-item:nth-child(even) .exp-meta { padding-right: 0; text-align: right; }

  .exp-company {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .exp-role {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .exp-list {
    list-style: none;
    display: flex; flex-direction: column; gap: 10px;
    margin-top: 18px;
  }
  .exp-list li {
    color: var(--muted);
    font-size: 0.9rem;
    display: flex; align-items: flex-start; gap: 10px;
    line-height: 1.6;
  }
  .exp-list li::before {
    content: '▸';
    color: var(--accent3);
    font-size: 0.75rem;
    flex-shrink: 0;
    margin-top: 3px;
  }

  /* ─── EDUCATION TIMELINE ─── */
  .edu-timeline {
    position: relative;
    padding-left: 36px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }
  .edu-timeline::before {
    content: '';
    position: absolute; left: 0; top: 10px; bottom: 10px;
    width: 2px;
    background: linear-gradient(to bottom, var(--accent2), var(--accent3), transparent);
    opacity: 0.5;
  }

  .edu-tl-item {
    position: relative;
    display: flex;
    gap: 28px;
    align-items: flex-start;
  }
  .edu-tl-item::before {
    content: '';
    position: absolute;
    left: -43px; top: 12px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--bg);
    border: 3px solid var(--accent2);
    box-shadow: 0 0 12px rgba(247,162,106,0.4);
    transition: all 0.3s;
  }
  .edu-tl-item:hover::before {
    background: var(--accent2);
    box-shadow: 0 0 20px rgba(247,162,106,0.6);
  }

  .edu-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px 32px;
    flex: 1;
    position: relative;
    overflow: hidden;
    transition: all 0.4s;
  }
  .edu-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, var(--accent2), var(--accent3));
  }
  .edu-card:hover { border-color: rgba(247,162,106,0.4); transform: translateX(6px); }

  .edu-year {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent2);
    letter-spacing: 0.1em;
    background: rgba(247,162,106,0.1);
    border: 1px solid rgba(247,162,106,0.2);
    padding: 4px 12px;
    border-radius: 3px;
    display: inline-block;
    margin-bottom: 12px;
  }

  .edu-degree {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .edu-school {
    color: var(--muted);
    font-size: 0.88rem;
    margin-bottom: 10px;
  }
  .edu-cgpa {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--accent3);
    display: flex; align-items: center; gap: 6px;
  }
  .cgpa-val { font-size: 1.25rem; font-weight: 500; }

  /* ─── PROJECTS ─── */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 24px;
  }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px;
    position: relative;
    overflow: hidden;
    transition: all 0.4s;
    cursor: default;
  }
  .project-card::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 80% 0%, rgba(124,106,247,0.08), transparent 60%);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .project-card:hover { border-color: rgba(124,106,247,0.5); transform: translateY(-6px); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  .project-card:hover::after { opacity: 1; }

  .project-number {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    font-weight: 900;
    color: rgba(124,106,247,0.1);
    line-height: 1;
    margin-bottom: 16px;
    transition: color 0.4s;
  }
  .project-card:hover .project-number { color: rgba(124,106,247,0.2); }

  .project-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
  }

  .project-desc {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .project-tech {
    display: flex; flex-wrap: wrap; gap: 6px;
  }

  .tech-badge {
    padding: 3px 10px;
    background: rgba(106,247,192,0.08);
    border: 1px solid rgba(106,247,192,0.2);
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--accent3);
    letter-spacing: 0.06em;
  }

  .edu-section { background: var(--surface); }

  /* ─── SOFT SKILLS ─── */
  .soft-skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-top: 0;
  }

  .soft-card {
    padding: 24px;
    border: 1px solid var(--border);
    border-radius: 8px;
    text-align: center;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .soft-card::before {
    content: attr(data-icon);
    position: absolute;
    font-size: 4rem;
    opacity: 0.04;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .soft-card:hover {
    border-color: rgba(124,106,247,0.4);
    background: rgba(124,106,247,0.04);
    transform: translateY(-4px);
  }
  .soft-card-title {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
  }

  /* ─── FOOTER ─── */
  footer {
    border-top: 1px solid var(--border);
    padding: 40px 60px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 20px;
  }

  .footer-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .footer-links { display: flex; gap: 24px; }
  .footer-links a {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--dim);
    text-decoration: none;
    letter-spacing: 0.08em;
    transition: color 0.3s;
  }
  .footer-links a:hover { color: var(--accent); }

  .footer-copy {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--dim);
    letter-spacing: 0.06em;
  }

  /* ─── SCROLL REVEAL ─── */
  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ─── CURSOR GLOW ─── */
  .cursor-glow {
    position: fixed;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,106,247,0.06), transparent 70%);
    pointer-events: none;
    z-index: 0;
    transform: translate(-50%, -50%);
    transition: left 0.1s, top 0.1s;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    nav { padding: 16px 24px; }
    .nav-links { display: none; }
    section, .hero { padding: 80px 24px; }
    footer { padding: 30px 24px; flex-direction: column; text-align: center; }
    .hero-contacts { position: static; flex-direction: row; flex-wrap: wrap; justify-content: flex-start; margin-top: 40px; }
    .scroll-indicator { display: none; }

    /* Mobile experience timeline — stack vertically */
    .exp-timeline::before { left: 16px; }
    .exp-item,
    .exp-item:nth-child(odd),
    .exp-item:nth-child(even) { flex-direction: column; }
    .exp-card { width: 100%; }
    .exp-item:nth-child(odd) .exp-card::after,
    .exp-item:nth-child(even) .exp-card::after { display: none; }
    .exp-node { flex-direction: row; width: 100%; justify-content: flex-start; padding-top: 0; padding-bottom: 12px; }
    .exp-meta { display: none; }

    /* Mobile education timeline */
    .edu-timeline { padding-left: 24px; }
    .edu-tl-item::before { left: -31px; }
  }

  /* ─── DIVIDER ─── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 0 60px;
  }

  /* Available badge */
  .available-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 16px;
    background: rgba(106,247,192,0.08);
    border: 1px solid rgba(106,247,192,0.25);
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent3);
    letter-spacing: 0.08em;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s 0.1s ease forwards;
  }
  .available-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    animation: pulse 2s ease-in-out infinite;
  }
  /* ─── CONTACT SECTION ─── */
  .contact-section { background: var(--surface); }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: 60px;
    align-items: start;
  }

  .contact-info-side {}

  .contact-info-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    line-height: 1.3;
  }

  .contact-info-desc {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.8;
    margin-bottom: 40px;
  }

  .contact-detail-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .contact-detail {
    display: flex;
    align-items: center;
    gap: 16px;
    text-decoration: none;
    transition: transform 0.3s;
  }
  .contact-detail:hover { transform: translateX(6px); }

  .contact-detail-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    background: var(--bg);
    flex-shrink: 0;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .contact-detail-icon::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(124,106,247,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .contact-detail:hover .contact-detail-icon {
    border-color: var(--accent);
    box-shadow: 0 0 16px rgba(124,106,247,0.3);
  }
  .contact-detail:hover .contact-detail-icon::before { opacity: 1; }

  .contact-detail-text {}
  .contact-detail-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .contact-detail-value {
    font-size: 0.9rem;
    color: var(--text);
  }

  /* ─── FORM ─── */
  .contact-form-side {}

  .contact-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
  }

  .form-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .form-input,
  .form-textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: all 0.3s;
    resize: none;
    width: 100%;
  }
  .form-input::placeholder,
  .form-textarea::placeholder {
    color: var(--dim);
    font-size: 0.88rem;
  }
  .form-input:focus,
  .form-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.12);
    background: rgba(124,106,247,0.03);
  }
  .form-input:focus + .form-focus-line,
  .form-textarea:focus + .form-focus-line {
    transform: scaleX(1);
  }

  .form-textarea { min-height: 130px; line-height: 1.7; }

  .form-submit {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .btn-send {
    padding: 15px 36px;
    background: linear-gradient(135deg, var(--accent), #9b8bfb);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.35s;
    box-shadow: 0 0 28px rgba(124,106,247,0.35);
    display: flex; align-items: center; gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .btn-send::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-send:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 40px rgba(124,106,247,0.55);
  }
  .btn-send:hover::before { opacity: 1; }
  .btn-send:active { transform: translateY(0); }
  .btn-send:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .btn-send .send-arrow {
    transition: transform 0.3s;
  }
  .btn-send:hover .send-arrow { transform: translateX(4px); }

  /* Status message */
  .form-status {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    padding: 10px 16px;
    border-radius: 6px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .form-status.success {
    display: flex;
    background: rgba(106,247,192,0.08);
    border: 1px solid rgba(106,247,192,0.25);
    color: var(--accent3);
  }
  .form-status.error {
    display: flex;
    background: rgba(247,106,106,0.08);
    border: 1px solid rgba(247,106,106,0.25);
    color: #f76a6a;
  }

  /* spinner */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-send.loading .spinner { display: block; }
  .btn-send.loading .send-text { display: none; }
  .btn-send.loading .send-arrow { display: none; }

  /* EmailJS setup notice */
  .setup-notice {
    background: rgba(247,162,106,0.08);
    border: 1px solid rgba(247,162,106,0.2);
    border-radius: 8px;

  @media (max-width: 900px) {

    .form-row { grid-template-columns: 1fr; }
  }

</head>

  // Step 2: Create a Gmail service → copy your Service ID
  // Step 3: Create an Email Template with variables:
  //         {{from_name}}, {{from_email}}, {{subject}}, {{message}}
  //         Set "To Email" = akshada1604@gmail.com
  // Step 4: Copy your Public Key from Account → API Keys
  // Step 5: Replace the three placeholders below:

  const EMAILJS_PUBLIC_KEY  = 'YOUR_PUBLIC_KEY';   // e.g. 'abc123XYZ'
  const EMAILJS_SERVICE_ID  = 'YOUR_SERVICE_ID';   // e.g. 'service_xxxxxx'
  const EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';  // e.g. 'template_xxxxxx'

  // Init EmailJS
  (function() {
    if (typeof emailjs !== 'undefined') {
      emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
    }
  })();

  function sendEmail() {
    const btn    = document.getElementById('sendBtn');
    const status = document.getElementById('formStatus');

    const name    = document.getElementById('from_name').value.trim();
    const email   = document.getElementById('from_email').value.trim();
    const subject = document.getElementById('subject').value.trim();
    const message = document.getElementById('message').value.trim();

    // Basic validation
    if (!name || !email || !message) {
      status.className = 'form-status error';
      status.textContent = '✕ Please fill in all required fields.';
      return;
    }
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      status.className = 'form-status error';
      status.textContent = '✕ Please enter a valid email address.';
      return;
    }

    // Check if keys are still placeholders
    if (EMAILJS_PUBLIC_KEY === 'YOUR_PUBLIC_KEY') {
      status.className = 'form-status error';
      status.textContent = '⚙ Please configure your EmailJS credentials first (see setup notice above).';
      return;
    }

    // Loading state
    btn.classList.add('loading');
    btn.disabled = true;
    status.className = 'form-status';
    status.style.display = 'none';

    const templateParams = { from_name: name, from_email: email, subject: subject || 'Portfolio Contact', message };

    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams)
      .then(() => {
        btn.classList.remove('loading');
        btn.disabled = false;
        status.className = 'form-status success';
        status.textContent = '✓ Message sent! I\'ll get back to you soon.';
        // Reset form
        document.getElementById('from_name').value = '';
        document.getElementById('from_email').value = '';
        document.getElementById('subject').value = '';
        document.getElementById('message').value = '';
      })
      .catch((err) => {
        btn.classList.remove('loading');
        btn.disabled = false;
        status.className = 'form-status error';
        status.textContent = '✕ Something went wrong. Please try again or email directly.';
        console.error('EmailJS error:', err);
      });
  }

  // ─── CURSOR GLOW ─────────────────────────────────────────────
  const glow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', e => {
    glow.style.left = e.clientX + 'px';
    glow.style.top  = e.clientY + 'px';
  });

  // ─── SCROLL REVEAL ───────────────────────────────────────────
  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 80);
      }
    });
  }, { threshold: 0.1 });
  reveals.forEach(el => observer.observe(el));

  // Stagger grid children
  document.querySelectorAll('.skills-grid, .projects-grid, .soft-skills-grid').forEach(grid => {
    Array.from(grid.children).forEach((child, i) => {
      child.style.transitionDelay = `${i * 0.1}s`;
    });
  });

  // Enter key submits form (but not in textarea)
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.id !== 'message') {
      const active = document.activeElement;
      if (['from_name','from_email','subject'].includes(active?.id)) sendEmail();
    }
  });
</script>
</body>
</html>
